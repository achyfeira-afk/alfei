<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaket – Achy Shop</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/Ec6Mj4p.png">
  <link rel="stylesheet" href="style.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .banner img {
      width: 100%;
      display: block;
    }

    .nav-box {
      display: flex;
      gap: 8px;
      padding: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-box input {
      flex: 1;
      min-width: 120px;
      padding: 8px;
    }

    .nav-btn {
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      background: #eee;
    }

    .nav-btn.active {
      background: black;
      color: white;
    }

    /* GRID DISAMAKAN TOTAL DENGAN ABAYA & FASHION (FIX GITHUB PAGES) */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
      padding: 10px;
      align-items: stretch;
    }

    .card {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #fff;
      border-radius: 15px;
      padding: 8px;
    }

    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
    }

    .card-content {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .card h3 {
      font-size: 13px;
      margin: 6px 0;
      line-height: 1.2;

      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;

      height: 32px;
    }

    .card p {
      font-size: 13px;
      font-weight: bold;
      color: #e91e63;
      margin: 4px 0;
      height: 18px;
    }

    .btn-shopee {
      margin-top: auto;
      display: block;
      text-align: center;
      background: #ee4d2d;
      color: #fff;
      padding: 7px;
      border-radius: 15px;
      font-size: 11px;
      font-weight: bold;
      text-decoration: none;
    }

    .wa-float {
      position: fixed;
      right: 15px;
      bottom: 15px;
      width: 42px;
      height: 42px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wa-float img {
      width: 60%;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .nav-box {
        position: static;
        justify-content: center;
        padding: 10px;
      }
    }

    /* FIX PC 5 KOLOM GITHUB PAGES */
    @media (min-width: 1024px) {
      .grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }
  </style>
</head>

<body>

<header class="header">

  <div class="banner">
    <img src="https://i.imgur.com/PTJpyVr.jpeg" alt="Banner Jaket">
  </div>

  <div class="nav-box">
    <input type="text" id="searchInput" placeholder="Cari produk...">

    <button class="nav-btn" onclick="location.href='index.html'">ABAYA</button>
    <button class="nav-btn" onclick="location.href='fashion.html'">FASHION</button>
    <button class="nav-btn active" onclick="location.href='jaket.html'">JAKET</button>
  </div>

</header>

<main class="container">
  <div class="grid" id="productList"></div>
</main>

<a class="wa-float" href="https://s.shopee.co.id/5q4CZW9Exj" target="_blank">
  <img src="https://i.imgur.com/nVTuNOE.png">
</a>

<script src="data.js"></script>
<script src="main.js"></script>

</body>
</html>
